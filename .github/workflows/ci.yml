name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CI: 'true'
  PNPM_VERSION: '10'
  NODE_VERSION: '22'

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: cp .env.example .env.local
      - run: |
          sed -i 's/sk_test_replace_me/sk_test_placeholder000000000000000000/' .env.local
          sed -i 's/pk_test_replace_me/pk_test_placeholder000000000000000000/' .env.local
      - run: pnpm check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec vitest run tests/unit/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint, unit]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: cp .env.example .env.local
      - run: |
          sed -i 's/sk_test_replace_me/sk_test_placeholder000000000000000000/' .env.local
          sed -i 's/pk_test_replace_me/pk_test_placeholder000000000000000000/' .env.local
      - run: pnpm build

  e2e:
    name: E2E (critical path)
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: forgeschool
          POSTGRES_PASSWORD: forgeschool
          POSTGRES_DB: forgeschool
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U forgeschool" --health-interval=10s
          --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: cp .env.example .env.local
      - run: |
          sed -i 's/sk_test_replace_me/sk_test_placeholder000000000000000000/' .env.local
          sed -i 's/pk_test_replace_me/pk_test_placeholder000000000000000000/' .env.local
      - run: pnpm db:migrate
      - run: pnpm exec playwright test tests/e2e/critical-path.spec.ts
